<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Course enrollment</title>
    <link rel="stylesheet" th:href="@{/css/pico.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</head>
<body>
<main class="container">
    <hgroup>
        <h1>Course enrollment</h1>
        <p>A Dynamic Consistency Boundary demo. Define courses and register students, then enroll them.</p>
    </hgroup>

    <div class="grid">
        <article>
            <header><strong>Define a course</strong></header>
            <form hx-post="/courses" hx-target="#feedback" hx-swap="innerHTML">
                <input type="text" name="title" placeholder="Title" required/>
                <input type="number" name="capacity" placeholder="Capacity" min="1" required/>
                <button type="submit">Define</button>
            </form>
        </article>
        <article>
            <header><strong>Register a student</strong></header>
            <form hx-post="/students" hx-target="#feedback" hx-swap="innerHTML">
                <input type="text" name="name" placeholder="Name" required/>
                <button type="submit">Register</button>
            </form>
        </article>
    </div>

    <div id="feedback"></div>

    <div th:replace="~{coursedashboard/dashboard :: dashboard}"></div>
</main>
</body>
</html>
